# ============================================================================
# Конфигурация системы навигации и управления
# Для Nvidia Jetson изменить порты на /dev/ttyTHS1, /dev/ttyTHS2, /dev/ttyTHS3
# ============================================================================

# Параметры узла gkv2_driver_node (входящий канал ПДУ -> БУД)
# Принимает команды CMD_BUD от пульта дистанционного управления
gkv2_driver:
  ros__parameters:
    uart_port: "/dev/ttyV0"        # На Jetson: /dev/ttyTHS1
    baudrate: 921600
    publish_rate_hz: 50            # Частота публикации согласно Protokol_BUD.docx п. 3.1.1
    qos_depth: 10

# Параметры узла gkv2_nav_parser_node (входящий канал ГКВ2 -> Jetson)
# Принимает навигационные данные (позиция, курс, скорости) от модуля ГКВ2
# Параметры узла gkv2_nav_parser_node (исходящий канал ГКВ2 -> Jetson)
gkv2_nav_parser:
  ros__parameters:
    uart_port: "/dev/ttyV1"
    baudrate: 921600
    qos_depth: 10
    
    # Порядок ID параметров в наборном пакете (тип 0x13)
    # Должен соответствовать настройке ГКВ2 через пакет 0x27
    # Каждый ID занимает 4 байта (float32), кроме *_int_* (int32) и статусных (uint32/uint16)
    packet_parameter_ids: [43, 44, 45, 36, 37, 38, 46, 47, 48, 
            64, 65, 66, 72, 79, 29, 13, 14, 85, 86, 87, 
            96, 98, 99, 100, 101, 102, 103, 104, 105, 106]

# Параметры узла cmd_vel_bridge_node (исходящий канал БУД -> Моторы)
# Отправляет команды управления на драйверы электродвигателей
cmd_vel_bridge:
  ros__parameters:
    # Кинематика платформы
    wheel_base: 0.7                # Ширина колеи, метры (60-80 см)
    max_speed_ms: 2.78             # Максимальная скорость 10 км/ч
    
    # UART для моторов
    motor_uart_port: "/dev/ttyV4"  # На Jetson: /dev/ttyTHS3
    motor_baudrate: 115200
    
    # Безопасность
    watchdog_timeout_sec: 0.3      # Таймаут watchdog (300 мс)
    
    # Частота отправки команд
    send_rate_hz: 50               # 50 Гц согласно Protokol_BUD.docx

    # Параметры одометра
odometer:
  ros__parameters:
    wheel_base: 0.7
    wheel_radius: 0.3
    encoder_ticks_per_rev: 1024.0
    use_mock: true  # true для тестирования, false для реального одометра

# Параметры слияния навигации
navigation_fusion:
  ros__parameters:
    gnss_timeout_sec: 2.0        # Таймаут потери ГНСС
    gnss_quality_threshold: 0.7  # Порог качества ГНСС
    min_satellites: 8            # Минимальное количество спутников
    require_rtk: true            # Требовать RTK Fixed

# Параметры узла gkv2_config_node
gkv2_config:
  ros__parameters:
    uart_port: "/dev/ttyV1"        # Тот же порт, что и у парсера
    baudrate: 921600
    device_address: 1
    timeout_sec: 5
    
    # Ожидаемые ID параметров в наборном пакете (должны совпадать с gkv2_nav_parser)
    expected_packet_ids: [43, 44, 45, 36, 37, 38, 46, 47, 48, 
           64, 65, 66, 72, 79, 29, 13,
           14, 85, 86, 87, 96, 98, 99, 100, 101, 102, 103, 104, 105, 106]